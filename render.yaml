services:
  - type: web
    name: meetiqo-api
    env: node
    plan: starter
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: meetiqo-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: meetiqo-redis
          property: connectionString
      - key: FRONTEND_URL
        value: https://meetiqo.vercel.app
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false

  - type: redis
    name: meetiqo-redis
    plan: starter
    ipAllowList: []

  - type: worker
    name: meetiqo-worker
    env: node
    plan: starter
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: node dist/worker.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: meetiqo-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: meetiqo-redis
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false

databases:
  - name: meetiqo-db
    plan: starter
    databaseName: meetiqo
    user: meetiqo
    postgresMajorVersion: 16
